<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e0d0b">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Dice Tactics</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a84c;
    --gold-light: #e0c068;
    --gold-dark: #a07830;
    --bg: #0e0d0b;
    --text: #f0e8d0;
    --text-dim: #8a7a5a;
  }

  html {
    height: 100%;
    overflow: hidden;
  }

  body {
    height: 100dvh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 40%, rgba(201,168,76,0.07) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 10%, rgba(201,168,76,0.04) 0%, transparent 45%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: clamp(1.2rem, 5vh, 2.5rem) 1.4rem clamp(1rem, 3vh, 1.8rem);
    padding-top: max(clamp(1.2rem, 5vh, 2.5rem), env(safe-area-inset-top));
    padding-bottom: max(clamp(1rem, 3vh, 1.8rem), env(safe-area-inset-bottom));
  }

  .header {
    flex-shrink: 0;
    margin-bottom: clamp(0.6rem, 2vh, 1.4rem);
    animation: fadeSlideDown 0.5s ease both;
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.9rem, 7vw, 3rem);
    font-weight: 900;
    letter-spacing: 0.02em;
    line-height: 1;
    background: linear-gradient(160deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    margin-top: 0.35rem;
    font-size: clamp(0.78rem, 2.8vw, 0.95rem);
    color: var(--text-dim);
    letter-spacing: 0.03em;
  }
  .subtitle span { margin: 0 0.3rem; opacity: 0.45; }

  .divider {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: clamp(0.6rem, 2vh, 1.4rem);
    animation: fadeIn 0.6s 0.15s ease both;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-dark), transparent);
    opacity: 0.4;
  }
  .divider-icon { font-size: 1rem; color: var(--gold-dark); opacity: 0.6; }

  .buttons {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: clamp(0.5rem, 1.8vh, 0.85rem);
  }

  .btn {
    position: relative;
    width: 100%;
    padding: clamp(0.75rem, 2.2vh, 1.1rem) 1.2rem;
    border: none;
    border-radius: 6px;
    font-family: 'Cinzel', serif;
    font-size: clamp(0.82rem, 2.5vw, 1rem);
    font-weight: 700;
    letter-spacing: 0.08em;
    cursor: pointer;
    overflow: hidden;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    animation: fadeSlideUp 0.45s ease both;
  }
  .btn:nth-child(1) { animation-delay: 0.08s; }
  .btn:nth-child(2) { animation-delay: 0.16s; }
  .btn:nth-child(3) { animation-delay: 0.24s; }

  .btn-primary {
    background: linear-gradient(160deg, #d4a84a 0%, #b8902e 60%, #9a7520 100%);
    color: #1a1208;
    box-shadow: 0 3px 16px rgba(201,168,76,0.22), inset 0 1px 0 rgba(255,255,255,0.14);
  }
  .btn-primary::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(255,255,255,0.09) 0%, transparent 55%);
    pointer-events: none;
  }
  .btn-primary:active {
    transform: scale(0.98) translateY(1px);
    box-shadow: 0 1px 8px rgba(201,168,76,0.18);
  }

  .code-section {
    flex-shrink: 0;
    margin-top: clamp(0.5rem, 1.8vh, 0.85rem);
    animation: fadeSlideUp 0.45s 0.32s ease both;
  }

  .code-input-wrapper {
    position: relative;
    border: 1px solid rgba(201,168,76,0.22);
    border-radius: 6px;
    background: rgba(201,168,76,0.04);
    transition: border-color 0.2s, background 0.2s;
  }
  .code-input-wrapper:focus-within {
    border-color: rgba(201,168,76,0.45);
    background: rgba(201,168,76,0.07);
  }

  .code-input {
    width: 100%;
    padding: clamp(0.75rem, 2.2vh, 1.1rem) 3rem clamp(0.75rem, 2.2vh, 1.1rem) 1.2rem;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Cinzel', serif;
    font-size: clamp(0.8rem, 2.5vw, 0.95rem);
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .code-input::placeholder { color: rgba(138,122,90,0.45); }

  .code-submit {
    position: absolute;
    right: 0.7rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--gold);
    font-size: 1.2rem;
    cursor: pointer;
    opacity: 0.55;
    transition: opacity 0.2s;
    padding: 0.25rem;
  }
  .code-submit:hover { opacity: 1; }

  .dice-row {
    display: flex;
    justify-content: center;
    gap: clamp(0.5rem, 2vw, 1rem);
    margin-top: auto;
    padding-top: clamp(0.8rem, 2vh, 1.5rem);
    opacity: 0.18;
    animation: fadeIn 0.8s 0.5s ease both;
  }
  @media (max-height: 580px) { .dice-row { display: none; } }

  .die {
    width: clamp(22px, 5vw, 28px);
    height: clamp(22px, 5vw, 28px);
    border: 1.5px solid var(--gold);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(0.55rem, 1.5vw, 0.7rem);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-weight: 700;
  }

  @keyframes fadeSlideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>Dice Tactics</h1>
    <p class="subtitle">Story<span>•</span>Bot Battle<span>•</span>Lobby Prototype</p>
  </div>

  <div class="divider">
    <span class="divider-icon">⬡</span>
  </div>

  <div class="buttons">
    <button class="btn btn-primary">Story Mode</button>
    <button class="btn btn-primary">Play with Bot</button>
    <button class="btn btn-primary">Create Game</button>
  </div>

  <div class="code-section">
    <div class="code-input-wrapper">
      <input class="code-input" type="text" placeholder="ENTER CODE" maxlength="8">
      <button class="code-submit" aria-label="Join">→</button>
    </div>
  </div>

  <div class="dice-row">
    <div class="die">D4</div>
    <div class="die">D6</div>
    <div class="die">D8</div>
    <div class="die">D12</div>
    <div class="die">D20</div>
  </div>

</div>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
